kind = "slides"
previewPath = "/handbook-pitch-deck/"
title = "FFPMA Allio Ecosystem Handbook"
version = "1.0.0"
id = "artifacts/handbook-pitch-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
localPort = 22375
name = "web"
paths = ["/handbook-pitch-deck/"]

[services.development]
run = "pnpm --filter @workspace/handbook-pitch-deck run dev"

[services.env]
PORT = "22375"
BASE_PATH = "/handbook-pitch-deck/"

[services.production]
build = ["pnpm", "--filter", "@workspace/handbook-pitch-deck", "run", "build"]
publicDir = "artifacts/handbook-pitch-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
